name: 🤖 Appium Android E2E → 📊 Reports → 🌐 GitHub Pages

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      android_version:
        description: "Android API level (default: 33)"
        required: false
        default: "33"

# Permissions: write to gh-pages branch for report hosting
permissions:
  contents:      write
  pages:         write
  id-token:      write
  actions:       read

concurrency:
  group:              "appium-e2e-${{ github.ref }}"
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# Global environment
# ─────────────────────────────────────────────────────────────
env:
  ANDROID_API:     ${{ github.event.inputs.android_version || '33' }}
  APPIUM_VERSION:  "2.4.1"
  REPORT_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
  RUN_NUMBER:      ${{ github.run_number }}

# ─────────────────────────────────────────────────────────────
# JOB 1 — Build frontend (needed to deploy with reports)
# ─────────────────────────────────────────────────────────────
jobs:
  build-frontend:
    name: 🏗️ Build React Frontend
    runs-on: ubuntu-latest

    outputs:
      dist_path: frontend/dist

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: 🔨 Build for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - name: 📦 Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Appium Android E2E Tests
  # ─────────────────────────────────────────────────────────────
  appium-e2e:
    name: 🤖 Appium E2E Tests (Android Chrome)
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      # ── Checkout ─────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── Java (required by Android SDK + emulator) ──────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── Android SDK ─────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Install emulator + system image ─────────────────────
      - name: 📱 Install Android emulator + system image
        run: |
          echo "Installing SDK components..."
          yes | sdkmanager --install \
            "emulator" \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API }}" \
            "system-images;android-${{ env.ANDROID_API }};google_apis;x86_64" \
            "build-tools;${{ env.ANDROID_API }}.0.0" \
            2>/dev/null | tail -5

          echo "Creating AVD..."
          echo no | avdmanager create avd \
            --name medibook_avd \
            --package "system-images;android-${{ env.ANDROID_API }};google_apis;x86_64" \
            --device "pixel_4" \
            --force

      # ── Enable KVM for hardware acceleration ─────────────────
      - name: ⚡ Enable KVM acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-clients libvirt-daemon-system \
            qemu-kvm 2>/dev/null | tail -3

      # ── Start Android Emulator ───────────────────────────────
      - name: 🚀 Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 10
        with:
          api-level:        ${{ env.ANDROID_API }}
          target:           google_apis
          arch:             x86_64
          avd-name:         medibook_avd
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Emulator started"

      # ── Wait for device to be ready ──────────────────────────
      - name: ⏳ Wait for emulator to be ready
        run: |
          adb wait-for-device
          for i in $(seq 1 30); do
            BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "  Boot check $i/30: '$BOOT'"
            [ "$BOOT" = "1" ] && echo "✅ Emulator ready!" && break
            sleep 5
          done

      # ── Setup Python ─────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/appium/requirements.txt

      - name: 📦 Install Python test dependencies
        run: pip install -r tests/appium/requirements.txt

      # ── Install & Start Appium ────────────────────────────────
      - name: 📱 Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@${{ env.APPIUM_VERSION }}
          appium driver install uiautomator2
          appium driver list --installed

      - name: 🚀 Start Appium server
        run: |
          appium server \
            --port 4723 \
            --log appium.log \
            --log-level info \
            --allow-cors &
          echo "Waiting for Appium to be ready..."
          for i in $(seq 1 20); do
            if curl -s http://127.0.0.1:4723/status | grep -q '"ready":true'; then
              echo "✅ Appium is ready!"
              break
            fi
            echo "  Attempt $i/20..."
            sleep 3
          done

      # ── Install Chrome on Emulator ────────────────────────────
      - name: 🌐 Verify Chrome on emulator
        run: |
          adb shell pm list packages | grep chrome || true
          echo "Chrome packages listed above."

      # ── Run Appium E2E Tests ─────────────────────────────────
      - name: 🧪 Run Appium E2E tests
        env:
          BASE_URL:     ${{ env.REPORT_BASE_URL }}
          APPIUM_HOST:  "127.0.0.1"
          APPIUM_PORT:  "4723"
          ANDROID_UDID: "emulator-5554"
          ANDROID_VER:  "13.0"
        run: |
          echo "Testing: $BASE_URL"
          python -m pytest tests/appium/ \
            -v \
            --tb=short \
            --capture=no \
            --json-report \
            --json-report-file=test-results.json \
            -p no:warnings \
            || true

      # ── Capture Appium logs ───────────────────────────────────
      - name: 📋 Capture Appium & ADB logs
        if: always()
        run: |
          mkdir -p "tests/appium/Test Results/Logs"
          [ -f appium.log ] && cp appium.log "tests/appium/Test Results/Logs/appium.log" || true
          adb logcat -d > "tests/appium/Test Results/Logs/adb.log" 2>/dev/null || true
          echo "Logs captured."

      # ── Generate Excel + HTML + Markdown reports ─────────────
      - name: 📊 Generate test reports
        if: always()
        run: |
          python tests/appium/generate_report.py \
            --json        test-results.json \
            --base-url    "${{ env.REPORT_BASE_URL }}" \
            --run-number  "${{ env.RUN_NUMBER }}"

      # ── Upload artifacts ──────────────────────────────────────
      - name: 📦 Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Automation_Test_Report
          path: "tests/appium/Test Results/Excel/Automation_Test_Report.xlsx"
          if-no-files-found: warn

      - name: 📦 Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HTML_Execution_Report
          path: "tests/appium/Test Results/HTML/"
          if-no-files-found: warn

      - name: 📦 Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: "tests/appium/Test Results/Screenshots/"
          if-no-files-found: ignore

      - name: 📦 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Logs
          path: "tests/appium/Test Results/Logs/"
          if-no-files-found: ignore

      - name: 📦 Upload Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Summary
          path: "tests/appium/Test Results/Summary/summary.md"
          if-no-files-found: warn

      - name: 📦 Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest_json_results
          path: test-results.json
          if-no-files-found: ignore

      # ── Share artifacts with next job ─────────────────────────
      - name: 📦 Upload results for Pages deployment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-results-for-pages
          path: |
            tests/appium/Test Results/
            test-results.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Publish Reports to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  publish-reports:
    name: 🌐 Publish Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-frontend, appium-e2e]
    if: always() && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for gh-pages branch

      # ── Download frontend build ───────────────────────────────
      - name: 📥 Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./gh-pages-site

      # ── Download test results ─────────────────────────────────
      - name: 📥 Download Appium results
        uses: actions/download-artifact@v4
        with:
          name: appium-results-for-pages
          path: ./downloaded-results
        continue-on-error: true

      # ── Setup Python ──────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install report deps
        run: pip install jinja2 openpyxl requests

      # ── Build reports portal under gh-pages-site/reports/ ────
      - name: 📊 Build report portal
        run: |
          # Re-generate HTML report if JSON exists
          JSON_PATH="downloaded-results/test-results.json"
          if [ -f "$JSON_PATH" ]; then
            mkdir -p "downloaded-results/tests/appium/Test Results/HTML"
            mkdir -p "downloaded-results/tests/appium/Test Results/Summary"
            python tests/appium/generate_report.py \
              --json       "$JSON_PATH" \
              --base-url   "${{ env.REPORT_BASE_URL }}" \
              --run-number "${{ env.RUN_NUMBER }}" \
              || true
            # Move generated reports into download dir
            cp -r "tests/appium/Test Results" "downloaded-results/" 2>/dev/null || true
          fi

          # Build the portal site
          python tests/appium/build_report_site.py \
            --run-number  "${{ env.RUN_NUMBER }}" \
            --base-url    "${{ env.REPORT_BASE_URL }}" \
            --report-src  "downloaded-results/Test Results" \
            --out-dir     "./gh-pages-site" \
            --json        "${JSON_PATH:-test-results.json}" \
            || echo "[WARN] Report site build completed with warnings."

          echo "--- gh-pages-site structure ---"
          find ./gh-pages-site -type f | head -30

      # ── Publish combined site (React app + reports) ───────────
      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          publish_branch:    gh-pages
          publish_dir:       ./gh-pages-site
          keep_files:        false
          commit_message:    |
            🤖 Build #${{ env.RUN_NUMBER }}: Deploy app + Appium test reports
            
            Deployed: ${{ env.REPORT_BASE_URL }}
            Reports:  ${{ env.REPORT_BASE_URL }}reports/latest/execution-report.html

      # ── Publish summary to GitHub Actions ────────────────────
      - name: 📋 GitHub Actions summary
        if: always()
        run: |
          REPORT_URL="${{ env.REPORT_BASE_URL }}reports/latest/execution-report.html"
          PORTAL_URL="${{ env.REPORT_BASE_URL }}"
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Read stats from JSON
          JSON_PATH="downloaded-results/test-results.json"
          if [ -f "$JSON_PATH" ]; then
            STATS=$(python3 - <<EOF
          import json
          with open("$JSON_PATH") as f:
              data = json.load(f)
          s = data.get("summary", {})
          t  = s.get("total",   0)
          p  = s.get("passed",  0)
          fa = s.get("failed",  0)
          sk = s.get("skipped", 0)
          pct = round(p/t*100,1) if t else 0
          print(f"{t}|{p}|{fa}|{sk}|{pct}")
          EOF
            )
            IFS='|' read TOTAL PASSED FAILED SKIPPED PCT <<< "$STATS"
          else
            TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; PCT=0
          fi

          cat >> $GITHUB_STEP_SUMMARY <<SUMMARY
          # 🤖 Android Appium Test Summary

          **Build Number:** ${{ env.RUN_NUMBER }}
          **Execution Date:** $NOW
          **Platform:** Android Chrome (Appium + UiAutomator2)

          | Metric | Value |
          |--------|-------|
          | Total Tests | $TOTAL |
          | Passed | ✅ $PASSED |
          | Failed | ❌ $FAILED |
          | Skipped | ⏭️ $SKIPPED |
          | Pass Rate | **$PCT%** |

          ## 🌐 Report URL

          > 🔗 [$REPORT_URL]($REPORT_URL)

          ## 📊 Reports Portal

          > 🔗 [$PORTAL_URL]($PORTAL_URL)
          SUMMARY
