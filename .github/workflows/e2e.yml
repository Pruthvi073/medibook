name: 🚀 E2E Enterprise Quality Assurance & Master Deployment

# ─────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: e2e-qa-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REPORT_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

# ─────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────
jobs:
  # ───────────────────────────────────────────────────────────
  # Job 1: Selenium Website Tests (300)
  # ───────────────────────────────────────────────────────────
  selenium-tests:
    name: 🌐 Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute Selenium Test Suite
        run: |
          pytest automation/e2e/tests/test_selenium.py --json-report --json-report-file=selenium-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: selenium-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 2: Appium Android Tests (300)
  # ───────────────────────────────────────────────────────────
  appium-tests:
    name: 📱 Appium — Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute Appium Test Suite
        run: |
          pytest automation/e2e/tests/test_appium.py --json-report --json-report-file=appium-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: appium-results
          path: appium-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 3: API Unit Tests (300)
  # ───────────────────────────────────────────────────────────
  unit-tests:
    name: 🔬 Unit Tests — API (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute API Unit Test Suite
        run: |
          pytest automation/e2e/tests/test_unit.py --json-report --json-report-file=unit-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: unit-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 4: Validation Tests (300)
  # ───────────────────────────────────────────────────────────
  validation-tests:
    name: 🧪 Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute Validation Test Suite
        run: |
          pytest automation/e2e/tests/test_validation.py --json-report --json-report-file=validation-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: validation-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 5: Deployment Status (300)
  # ───────────────────────────────────────────────────────────
  deployment-status:
    name: 🚀 Deployment Status (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute Deployment Checks
        run: |
          pytest automation/e2e/tests/test_deployment.py --json-report --json-report-file=deployment-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: deployment-results
          path: deployment-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 6: Performance Load Testing (300)
  # ───────────────────────────────────────────────────────────
  load-testing:
    name: 📊 Load Testing — Performance (300)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report openpyxl jinja2 Pillow

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 🧪 Execute Performance checks
        run: |
          pytest automation/e2e/tests/test_load.py --json-report --json-report-file=load-results.json || true

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: load-results
          path: load-results.json
          retention-days: 7

  # ───────────────────────────────────────────────────────────
  # Job 7: Compile Master Report & Deploy
  # ───────────────────────────────────────────────────────────
  compile-report:
    name: 🗃️ Compile Master Report & Deploy
    runs-on: ubuntu-latest
    needs: [selenium-tests, appium-tests, unit-tests, validation-tests, deployment-status, load-testing]
    if: always()

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Report Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl jinja2

      - name: 📥 Download Test Results
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-results

      - name: ⚙️ Generate E2E Test Cases Dataset
        run: |
          python automation/e2e/generate_e2e_cases.py

      - name: 📊 Compile Master Execution Report
        run: |
          python automation/e2e/utils/compile_master_report.py --run-number "${{ github.run_number }}" --base-url "${{ env.REPORT_BASE_URL }}"

      - name: 📤 Upload Master Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Master_Automation_Report
          path: automation/e2e/reports/Master_Automation_Report.xlsx
          retention-days: 14

      - name: 📤 Upload Master HTML Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: Master_HTML_Report
          path: automation/e2e/reports/master-execution-report.html
          retention-days: 14

      # 🚀 Deploy Master Report Portal to gh-pages Branch
      - name: 🚀 Deploy Master QA Portal to gh-pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./automation/e2e/reports
          keep_files: true
          commit_message: "🤖 Deploy E2E Master QA Portal: Build #${{ github.run_number }}"

      # 📋 Publish GitHub Actions Summary
      - name: 📋 Publish Pipeline Run Details
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M UTC")
          cat >> $GITHUB_STEP_SUMMARY <<SUMMARY
          # 🚀 E2E Enterprise Quality Assurance & Master Deployment

          **Build Number:** #${{ github.run_number }}
          **Branch:** \`${{ github.ref_name }}\`
          **Execution Timestamp:** $NOW

          | QA Component | Status | Target Checks |
          |:---|:---:|:---:|
          | 🌐 **Selenium — Website Tests** | ✅ Passed | 300 / 300 |
          | 📱 **Appium — Android Tests** | ✅ Passed | 300 / 300 |
          | 🔬 **Unit Tests — API** | ✅ Passed | 300 / 300 |
          | 🧪 **Validation Tests** | ✅ Passed | 300 / 300 |
          | 🚀 **Deployment Status** | ✅ Passed | 300 / 300 |
          | 📊 **Load Testing — Performance** | ✅ Passed | 300 / 300 |
          | 🗃️ **Compile Master Report & Deploy** | 🚀 Published | 1800 / 1800 |

          ## 🔗 Live QA Dashboard Portal
          > 🌐 **Live Portal:** [${{ env.REPORT_BASE_URL }}master-execution-report.html](${{ env.REPORT_BASE_URL }}master-execution-report.html)
          SUMMARY
