[pytest]
testpaths   = tests/appium
python_files= test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -v
    --capture=no
log_cli       = true
log_cli_level = INFO
markers =
    smoke: fast smoke tests
    regression: full regression suite
    mobile: mobile-specific tests
