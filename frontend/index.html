<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- GitHub Pages SPA redirect: restore route from query-string set by 404.html -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>


    <!-- ── SEO Meta Tags ────────────────────────────────────── -->
    <title>MediBook — AI Disease Prediction</title>
    <meta name="description" content="MediBook uses Machine Learning to provide instant preliminary disease predictions from your symptoms. Free, private, and built for everyone." />

    <meta name="author"      content="MediBook Team" />

    <!-- Open Graph (social sharing) -->
