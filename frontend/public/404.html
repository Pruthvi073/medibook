<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MediBook</title>
    <script type="text/javascript">
      /**
       * GitHub Pages SPA Routing Fix
       *
       * GitHub Pages serves a 404 for any path that isn't an actual file.
       * This script converts the URL to a query-string redirect that the
       * index.html can pick up and restore.
       *
       * Source: https://github.com/rafgraph/spa-github-pages
       */
      var pathSegmentsToKeep = 1; // 1 = keep the /<repo-name>/ segment

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
